apiVersion: apps/v1
kind: Deployment
metadata:
  name: animal-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: animal-app
  template:
    metadata:
      labels:
        app: animal-app
    spec:
      containers:
      - name: animal-app
        image: 099438709079.dkr.ecr.us-east-1.amazonaws.com/cute-animal-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: animal-service
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: animal-app
