name: Deploy to EKS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and Push to ECR
      run: |
        docker build -t cute-animal-app .
        docker tag cute-animal-app:latest ${{ steps.login-ecr.outputs.registry }}/cute-animal-app:latest
        docker push ${{ steps.login-ecr.outputs.registry }}/cute-animal-app:latest

    - name: Update K8s Deployment
      run: |
        aws eks update-kubeconfig --name animal-cluster --region us-east-1
        kubectl apply -f k8s-deploy.yaml
